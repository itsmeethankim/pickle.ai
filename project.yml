name: PickleAI
options:
  bundleIdPrefix: com.pickleai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  FirebaseAuth:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.0.0
  FirebaseFirestore:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.0.0
  FirebaseStorage:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.0.0
  FirebaseFunctions:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.0.0

targets:
  PickleAI:
    type: application
    platform: iOS
    sources:
      - path: PickleAI
    resources:
      - path: PickleAI/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSCameraUsageDescription: "PickleAI needs camera access to record your swing."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PickleAI needs photo library access to select swing videos."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: FirebaseFirestore
        product: FirebaseFirestore
      - package: FirebaseStorage
        product: FirebaseStorage
      - package: FirebaseFunctions
        product: FirebaseFunctions
